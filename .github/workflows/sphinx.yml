name: Sphinx

on:
  pull_request:
  push:

jobs:
  linkcheck:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@v6
      with:
        fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Fetch base branch for diff
      if: github.event_name == 'pull_request'
      run: git fetch origin ${{ github.event.pull_request.base.sha }}
    - name: Get changed source files
      id: changed
      if: github.event_name == 'pull_request'
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PUSH_BEFORE_SHA: ${{ github.event.before }}
      run: python tools/list_changed_source_files.py
    - name: Install Python dependencies
      if: github.event_name == 'push' || steps.changed.outputs.files != ''
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
    - name: Check for broken links
      if: github.event_name == 'push' || steps.changed.outputs.files != ''
      run: sphinx-build -q --color -b linkcheck source build ${{ steps.changed.outputs.files }}

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@v6
    - name: Set up Graphviz
      run: sudo apt update && sudo apt install -y graphviz
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
    - name: Load problem matcher
      uses: ammaraskar/sphinx-problem-matcher@master
    - name: Check for build issues
      run: sphinx-build -W --keep-going -b dummy source build
